<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>suldul</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f9f8f6;--surface:#fff;--border:#e8e6e1;--text:#1a1917;--muted:#9c9890;--accent:#1a1917}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh;max-width:640px;margin:0 auto}
  .header{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border);flex-shrink:0}
  .header-left{display:flex;align-items:center;gap:12px}
  .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--bg);font-weight:500}
  .header h1{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--text)}
  .status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 2.5s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .messages{flex:1;overflow-y:auto;padding:32px 28px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
  .messages::-webkit-scrollbar{width:0}
  .msg{display:flex;flex-direction:column;gap:4px;animation:fadeUp .25s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-items:flex-end}
  .msg.bot{align-items:flex-start}
  .msg-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;padding:0 4px}
  .bubble{padding:12px 16px;border-radius:16px;font-size:14.5px;line-height:1.65;max-width:80%}
  .msg.bot .bubble{background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px}
  .msg.user .bubble{background:var(--accent);border-bottom-right-radius:4px;color:#f9f8f6}
  .typing-dots{display:flex;gap:4px;align-items:center;padding:4px 2px}
  .typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bounce 1.2s ease-in-out infinite}
  .typing-dots span:nth-child(2){animation-delay:.15s}
  .typing-dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
  .suggestions{display:flex;gap:8px;flex-wrap:wrap;padding:0 28px 12px;flex-shrink:0}
  .suggestion{background:transparent;border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;white-space:nowrap}
  .suggestion:hover{border-color:var(--accent);color:var(--text)}
  .input-area{padding:12px 28px 24px;flex-shrink:0;border-top:1px solid var(--border)}
  .input-row{display:flex;gap:10px;align-items:flex-end}
  textarea{flex:1;background:#fff;border:1px solid var(--border);border-radius:12px;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;resize:none;max-height:120px;min-height:44px;padding:11px 14px;transition:border-color .18s}
  textarea:focus{border-color:var(--accent)}
  textarea::placeholder{color:var(--muted)}
  .send-btn{width:44px;height:44px;border-radius:12px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .18s;opacity:.3;pointer-events:none}
  .send-btn.active{opacity:1;pointer-events:all}
  .send-btn svg{width:16px;height:16px;fill:#f9f8f6}
  .intro{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;flex:1;padding:0 0 8px;animation:fadeUp .4s ease both}
  .intro-name{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--text);letter-spacing:-1px;margin-bottom:10px}
  .intro p{color:var(--muted);font-size:14px;line-height:1.6;max-width:340px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="avatar">su</div>
      <h1>suldul</h1>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span>онлайн</span>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="intro" id="intro">
      <div class="intro-name">suldul.</div>
      <p>Твой собеседник для болтовни, шуток и всего остального. Напиши что угодно.</p>
    </div>
  </div>
  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="sendSuggestion(this)">расскажи анекдот</button>
    <button class="suggestion" onclick="sendSuggestion(this)">скажи комплимент</button>
    <button class="suggestion" onclick="sendSuggestion(this)">угадай моё настроение</button>
    <button class="suggestion" onclick="sendSuggestion(this)">сыграем в игру?</button>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Напиши что-нибудь..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this);updateBtn()"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const history=[];let isTyping=false;
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function updateBtn(){document.getElementById('sendBtn').classList.toggle('active',document.getElementById('input').value.trim().length>0)}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function sendSuggestion(btn){document.getElementById('input').value=btn.textContent.trim();updateBtn();sendMessage()}
function addMessage(role,text){
  const intro=document.getElementById('intro');if(intro)intro.remove();
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');div.className=`msg ${role}`;
  const label=document.createElement('div');label.className='msg-label';label.textContent=role==='bot'?'suldul':'ты';
  const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=text;
  div.appendChild(label);div.appendChild(bubble);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function showTyping(){
  const intro=document.getElementById('intro');if(intro)intro.remove();
  const msgs=document.getElementById('messages');
  const div=document.createElement('div');div.className='msg bot';div.id='typing';
  const label=document.createElement('div');label.className='msg-label';label.textContent='suldul';
  const bubble=document.createElement('div');bubble.className='bubble';
  bubble.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(label);div.appendChild(bubble);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove()}
async function sendMessage(){
  if(isTyping)return;
  const input=document.getElementById('input');
  const text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';updateBtn();
  document.getElementById('suggestions').classList.add('hidden');
  addMessage('user',text);history.push({role:'user',content:text});
  isTyping=true;showTyping();
  try{
    const response=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history})});
    const data=await response.json();
    removeTyping();addMessage('bot',data.reply||'Что-то пошло не так 😅');
    history.push({role:'assistant',content:data.reply});
  }catch(err){removeTyping();addMessage('bot','Ой, что-то сломалось. Попробуй ещё раз!')}
  isTyping=false;
}
</script>
</body>
</html>
